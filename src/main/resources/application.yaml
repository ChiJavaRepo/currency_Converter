spring:
  application:
    name: currency_converter


  profiles:
    active: postgres

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:gospel_db
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info



